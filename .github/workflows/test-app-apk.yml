name: Build Test App APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'test-app/**'
      - 'gradle/**'
      - 'buildSrc/**'
      - 'settings.gradle*'
      - 'gradle.properties'

jobs:
  build-apk:
    name: Build test-app debug APK
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx3g -XX:+UseParallelGC"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build test-app debug APK
        run: ./gradlew :test-app:assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-app-debug-apk
          path: test-app/build/outputs/apk/debug/*.apk
          retention-days: 7
